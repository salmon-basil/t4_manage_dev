<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>ホーム</title>

        <link rel="stylesheet" href="../CSS/base.css" />
        <link rel="stylesheet" href="../CSS/home.css" />
    </head>

    <body>
        <div class="home">
            <h1>ホーム</h1>

            <div class="user-info">
                <p><strong>ユーザー名</strong></p>
                <p id="username">ー</p>
                <p><strong>総勉強時間</strong></p>
                <p id="total-study-time">ー</p>
            </div>

            <div class="button-group">
                <a class="menu-button" href="./profilePage.html"> プロフィール </a>
                <a class="menu-button" href="./rankingPage.html"> ランキング </a>
                <a class="menu-button" href="./timerPage.html"> タイマー </a>
            </div>

            <a class="back-button" href="./login.html"> ログアウト </a>
        </div>
        <script>
            const API_BASE = 'http://localhost:3000/api';

            const formatStudyMinutes = (minutes) => {
                const totalMinutes = Number(minutes) || 0;
                const hours = Math.floor(totalMinutes / 60);
                const mins = totalMinutes % 60;

                if (hours > 0 && mins > 0) {
                    return `${hours}時間${mins}分`;
                }
                if (hours > 0) {
                    return `${hours}時間`;
                }
                return `${mins}分`;
            };

            const loadUsername = async () => {
                const userData = JSON.parse(localStorage.getItem('user') || 'null');
                if (!userData || !userData.id) {
                    console.log('ユーザー情報がありません');
                    return;
                }

                // まずはキャッシュ値を表示し、サーバーの最新情報で上書きする
                document.getElementById('username').textContent = userData.username || 'ー';

                try {
                    const response = await fetch(`${API_BASE}/profile/${userData.id}`);
                    if (!response.ok) {
                        throw new Error('ユーザー情報の取得に失敗しました');
                    }
                    const profile = await response.json();
                    document.getElementById('username').textContent = profile.username || 'ー';
                } catch (error) {
                    console.error(error);
                }
            };

            const loadStudyTime = async () => {
                const userData = JSON.parse(localStorage.getItem('user') || 'null');
                const totalElement = document.getElementById('total-study-time');
                if (!userData || !userData.id || !totalElement) {
                    return;
                }

                totalElement.textContent = '0分';

                try {
                    const response = await fetch(`${API_BASE}/study-records/${userData.id}`);
                    if (!response.ok) {
                        throw new Error('勉強履歴の取得に失敗しました');
                    }

                    const history = await response.json();
                    const totalMinutes = Array.isArray(history)
                        ? history.reduce((sum, record) => sum + Number(record.studyMinutes || 0), 0)
                        : 0;

                    totalElement.textContent = formatStudyMinutes(totalMinutes);
                } catch (error) {
                    console.error(error);
                    totalElement.textContent = 'ー';
                }
            };

            window.addEventListener('DOMContentLoaded', () => {
                loadUsername();
                loadStudyTime();
            });
        </script>
    </body>
</html>
