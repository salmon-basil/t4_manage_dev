<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン</title>
    <link rel="stylesheet" href="../CSS/login.css" />
</head>
<body>
    <div class="login-page">
        <main class="login-card">
            <div class="login-header">
                <h1>ログイン</h1>
                <p>ユーザー名とパスワードでサインインしてください。</p>
            </div>

            <form class="login-form">
                <label for="username">ユーザー名</label>
                <input id="username" name="username" type="text" placeholder="ユーザー名を入力" required />

                <label for="password">パスワード</label>
                <input id="password" name="password" type="password" placeholder="パスワードを入力" required />

                <button type="submit">ログイン</button>
                <button type="button" class="signup-button" onclick="location.href='newPage.html'">新規会員登録</button>
            </form>
        </main>
    </div>
    <script src="../js/authSystem.js"></script>
</body>
</html>
