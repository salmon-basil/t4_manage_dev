            const loadProfileData = async (viewUserId) => {
                if (!viewUserId) {
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE}/profile/${viewUserId}`);
                    if (!response.ok) {
                        throw new Error('プロフィールの取得に失敗しました');
                    }

                    const profile = await response.json();
                    document.getElementById('profile-username').textContent =
                        profile.username || 'ー';
                    document.getElementById('profile-nickname').textContent =
                        profile.nickname || 'ー';
                    document.getElementById('profile-goal').textContent = profile.goal || 'ー';
                    setRankBadge(profile.rank);
                    document.getElementById('profile-title').textContent = isOwnProfile(viewUserId)
                        ? 'プロフィール'
                        : profile.username || 'プロフィール';
                } catch (error) {
                    console.error(error);
                    document.getElementById('profile-username').textContent = 'ー';
                    document.getElementById('profile-nickname').textContent = 'ー';
                    document.getElementById('profile-goal').textContent = 'ー';
                    setRankBadge(null);
                }
            };

            const loadStudyHistory = async (viewUserId) => {
                try {
                    if (!viewUserId) {
                        return;
                    }

                    const response = await fetch(`${API_BASE}/study-records/${viewUserId}`);
                    if (!response.ok) {
                        throw new Error('勉強履歴の取得に失敗しました');
                    }

                    const history = await response.json();
                    const historyList = document.querySelector('.history-list');
                    const historyChart = document.querySelector('.history-chart');
                    const studyTimeElement = document.getElementById('profile-study-time');
                    const totalMinutes = Array.isArray(history)
                        ? history.reduce((sum, record) => sum + Number(record.studyMinutes || 0), 0)
                        : 0;

                    if (studyTimeElement) {
                        studyTimeElement.textContent = formatStudyMinutes(totalMinutes);
                    }

                    if (history.length === 0) {
                        historyList.innerHTML = '<p class="no-data">データがありません</p>';
                        historyChart.innerHTML = '';
                        return;
                    }

                    const maxMinutes = Math.max(...history.map((record) => record.studyMinutes), 1);

                    historyList.innerHTML = history
                        .map((record) => {
                            const date = new Date(record.studyDate).toLocaleDateString('ja-JP');
                            return `<div class="history-item"><span>${date}</span><span>${record.studyMinutes}分</span></div>`;
                        })
                        .join('');

                    historyChart.innerHTML = history
                        .slice()
                        .reverse()
                        .map((record) => {
                            const date = new Date(record.studyDate).toLocaleDateString('ja-JP', {
                                month: 'numeric',
                                day: 'numeric',
                            });
                            const height = Math.round((record.studyMinutes / maxMinutes) * 100);

                            return `
                                <div class="chart-bar">
                                    <div class="bar-value">${record.studyMinutes}分</div>
                                    <div class="bar-track">
                                        <div class="bar-fill" style="height: ${height}%;"></div>
                                    </div>
                                    <div class="bar-label">${date}</div>
                                </div>
                            `;
                        })
                        .join('');
                } catch (error) {
                    console.error(error);
                    const studyTimeElement = document.getElementById('profile-study-time');
                    if (studyTimeElement) {
                        studyTimeElement.textContent = 'ー';
                    }
                }
            };

            window.addEventListener('DOMContentLoaded', () => {
                const viewUserId = getViewUserId();
                applyEditVisibility(viewUserId);
                applyUsernameBoxVisibility(viewUserId);
                loadProfileData(viewUserId);
                loadStudyHistory(viewUserId);
            });
        </script>
