<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>プロフィール</title>

        <link rel="stylesheet" href="../CSS/base.css" />
        <link rel="stylesheet" href="../CSS/profile.css" />
    </head>

    <body>
        <div class="profile">

            <h1>プロフィール</h1>
            <div class="profile-container">
                <div class="profile-info">

                    <div class="info-box">
                        <p class="title">ユーザー名</p>
                        <p class="value">ー</p>
                    </div>

                    <div class="info-box">
                        <p class="title">ニックネーム</p>
                        <p class="value">ー</p>
                    </div>

                    <div class="info-box">
                        <p class="title">目標</p>
                        <p class="value">ー</p>
                    </div>

                    <div class="info-box">
                        <p class="title">総勉強時間</p>
                        <p class="value">ー</p>
                    </div>

                    <div class="info-box">
                        <p class="title">ランク</p>
                        <p class="value">ー
                        </p>
                    </div>

                </div>

                <div class="study-history">
                    <h2>勉強時間履歴</h2>
                    <div class="history-list">
                        <p class="no-data">データがありません</p>
                    </div>
                </div>
            </div>

            <a class="back-button" href="./homePage.html">
                戻る
            </a>

        </div>

        <script>
            const API_BASE = 'http://localhost:3000/api';

            const loadStudyHistory = async () => {
                try {
                    const user = JSON.parse(localStorage.getItem('user'));
                    if (!user || !user.userId) {
                        return;
                    }

                    const response = await fetch(`${API_BASE}/study/${user.userId}`);
                    if (!response.ok) {
                        throw new Error('勉強履歴の取得に失敗しました');
                    }

                    const history = await response.json();
                    const historyList = document.querySelector('.history-list');

                    if (history.length === 0) {
                        historyList.innerHTML = '<p class="no-data">データがありません</p>';
                        return;
                    }

                    historyList.innerHTML = history.map(record => {
                        const date = new Date(record.studyDate).toLocaleDateString('ja-JP');
                        return `<div class="history-item"><span>${date}</span><span>${record.studyMinutes}分</span></div>`;
                    }).join('');
                } catch (error) {
                    console.error(error);
                }
            };

            window.addEventListener('DOMContentLoaded', loadStudyHistory);
        </script>
    </body>
</html>
