<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>プロフィール</title>

        <link rel="stylesheet" href="../CSS/base.css" />
        <link rel="stylesheet" href="../CSS/profile.css" />
    </head>

    <body>
        <div class="profile">
            <h1>プロフィール</h1>
            <a class="edit-button" href="./profileedit.html">プロフィールを編集</a>
            <div class="profile-container">
                <div class="profile-info">
                    <div class="info-box">
                        <p class="title">ユーザー名</p>
                        <p id="profile-username" class="value">ー</p>
                    </div>

                    <div class="info-box">
                        <p class="title">ニックネーム</p>
                        <p id="profile-nickname" class="value">ー</p>
                    </div>

                    <div class="info-box">
                        <p class="title">目標</p>
                        <p id="profile-goal" class="value">ー</p>
                    </div>

                    <div class="info-box">
                        <p class="title">総勉強時間</p>
                        <p id="profile-study-time" class="value">ー</p>
                    </div>

                    <div class="info-box">
                        <p class="title">ランク</p>
                        <p id="profile-rank" class="value">ー</p>
                    </div>
                </div>

                <div class="study-history">
                    <h2>勉強時間履歴</h2>
                    <div class="history-list">
                        <p class="no-data">データがありません</p>
                    </div>
                    <div class="history-chart" aria-label="勉強時間の棒グラフ"></div>
                </div>
            </div>

            <a class="back-button" href="./homePage.html"> 戻る </a>
        </div>

        <script>
            const API_BASE = 'http://localhost:3000/api';

            const RANK_LABELS = {
                1: 'BRONZE',
                2: 'SILVER',
                3: 'GOLD',
                4: 'PLATINUM',
                5: 'DIAMOND',
            };

            const formatStudyMinutes = (minutes) => {
                const totalMinutes = Number(minutes) || 0;
                const hours = Math.floor(totalMinutes / 60);
                const mins = totalMinutes % 60;

                if (hours > 0 && mins > 0) {
                    return `${hours}時間${mins}分`;
                }
                if (hours > 0) {
                    return `${hours}時間`;
                }
                return `${mins}分`;
            };

            const loadProfileData = async () => {
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                if (!user || !user.id) {
                    return;
                }

                try {
                    const response = await fetch(`${API_BASE}/profile/${user.id}`);
                    if (!response.ok) {
                        throw new Error('プロフィールの取得に失敗しました');
                    }

                    const profile = await response.json();
                    document.getElementById('profile-username').textContent =
                        profile.username || 'ー';
                    document.getElementById('profile-nickname').textContent =
                        profile.nickname || 'ー';
                    document.getElementById('profile-goal').textContent = profile.goal || 'ー';
                    document.getElementById('profile-rank').textContent =
                        RANK_LABELS[profile.rank] || 'ー';
                } catch (error) {
                    console.error(error);
                    document.getElementById('profile-username').textContent = user.username || 'ー';
                    document.getElementById('profile-nickname').textContent = 'ー';
                    document.getElementById('profile-goal').textContent = 'ー';
                    document.getElementById('profile-rank').textContent = 'ー';
                }
            };

            const loadStudyHistory = async () => {
                try {
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    if (!user || !user.id) {
                        return;
                    }

                    const response = await fetch(`${API_BASE}/study-records/${user.id}`);
                    if (!response.ok) {
                        throw new Error('勉強履歴の取得に失敗しました');
                    }

                    const history = await response.json();
                    const historyList = document.querySelector('.history-list');
                    const historyChart = document.querySelector('.history-chart');
                    const studyTimeElement = document.getElementById('profile-study-time');
                    const totalMinutes = Array.isArray(history)
                        ? history.reduce((sum, record) => sum + Number(record.studyMinutes || 0), 0)
                        : 0;

                    if (studyTimeElement) {
                        studyTimeElement.textContent = formatStudyMinutes(totalMinutes);
                    }

                    if (history.length === 0) {
                        historyList.innerHTML = '<p class="no-data">データがありません</p>';
                        historyChart.innerHTML = '';
                        return;
                    }

                    const maxMinutes = Math.max(...history.map((record) => record.studyMinutes), 1);

                    historyList.innerHTML = history
                        .map((record) => {
                            const date = new Date(record.studyDate).toLocaleDateString('ja-JP');
                            return `<div class="history-item"><span>${date}</span><span>${record.studyMinutes}分</span></div>`;
                        })
                        .join('');

                    historyChart.innerHTML = history
                        .slice()
                        .reverse()
                        .map((record) => {
                            const date = new Date(record.studyDate).toLocaleDateString('ja-JP', {
                                month: 'numeric',
                                day: 'numeric',
                            });
                            const height = Math.round((record.studyMinutes / maxMinutes) * 100);

                            return `
                                <div class="chart-bar">
                                    <div class="bar-value">${record.studyMinutes}分</div>
                                    <div class="bar-fill" style="height: ${height}%;"></div>
                                    <div class="bar-label">${date}</div>
                                </div>
                            `;
                        })
                        .join('');
                } catch (error) {
                    console.error(error);
                    const studyTimeElement = document.getElementById('profile-study-time');
                    if (studyTimeElement) {
                        studyTimeElement.textContent = 'ー';
                    }
                }
            };

            window.addEventListener('DOMContentLoaded', () => {
                loadProfileData();
                loadStudyHistory();
            });
        </script>
    </body>
</html>
