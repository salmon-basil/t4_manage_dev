<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ランキング</title>

        <link rel="stylesheet" href="../CSS/base.css" />
        <link rel="stylesheet" href="../CSS/ranking.css" />
    </head>

    <body>
        <main class="ranking-page">
            <section class="ranking-panel">
                <header class="ranking-header">
                    <div>
                        <p class="breadcrumb">ホーム / ランキング</p>
                        <h1>ランキング</h1>
                        <p class="subtitle">学習の成果をランキングで確認しましょう。</p>
                        <div class="user-rank-panel">
                            <img
                                src="../../../../../public/bronze.png"
                                alt="BRONZE"
                                class="user-rank-top-img"
                            />
                            <p class="user-rank">
                                あなたのランク:
                                <span id="user-rank-value" class="tier-badge">ー</span>
                            </p>
                        </div>
                    </div>
                    <div class="rank-update-countdown">
                        <p id="countdown-text">ランク更新まで: 計算中...</p>
                        <button id="rank-update-btn" class="rank-update-btn admin-only">
                            ランクを更新する
                        </button>
                        <button id="random-study-btn" class="rank-update-btn admin-only">
                            勉強時間をランダムで追加
                        </button>
                    </div>
                    <a class="back-button" href="./homePage.html">戻る</a>
                </header>

                <div class="ranking-summary">
                    <div class="summary-card gold">
                        <span class="rank-label">1位</span>
                        <strong class="top-name">ー</strong>
                        <small class="top-points">データなし</small>
                    </div>
                    <div class="summary-card silver">
                        <span class="rank-label">2位</span>
                        <strong class="top-name">ー</strong>
                        <small class="top-points">データなし</small>
                    </div>
                    <div class="summary-card bronze">
                        <span class="rank-label">3位</span>
                        <strong class="top-name">ー</strong>
                        <small class="top-points">データなし</small>
                    </div>
                </div>

                <div class="rank-tabs" id="rank-tabs">
                    <button type="button" class="rank-tab tier-bronze" data-rank="1">BRONZE</button>
                    <button type="button" class="rank-tab tier-silver" data-rank="2">SILVER</button>
                    <button type="button" class="rank-tab tier-gold" data-rank="3">GOLD</button>
                    <button type="button" class="rank-tab tier-platinum" data-rank="4">PLATINUM</button>
                    <button type="button" class="rank-tab tier-diamond" data-rank="5">DIAMOND</button>
                </div>

                <div class="table-wrap">
                    <table class="ranking-table">
                        <thead>
                            <tr>
                                <th>順位</th>
                                <th>ユーザー名</th>
                                <th>勉強時間(分)</th>
                            </tr>
                        </thead>
                        <tbody id="ranking-tbody">
                            <!-- JSで全件を挿入します -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <script src="../js/authSystem.js"></script>
        <script src="../js/ranking.js"></script>
    </body>
</html>
