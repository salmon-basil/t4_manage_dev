<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>勉強タイマー</title>

        <link rel="stylesheet" href="../CSS/base.css" />
        <link rel="stylesheet" href="../CSS/timer.css" />
    </head>

    <body>
        <div class="content">
            <form id="studyForm">
                <div class="info">
                    <div class="clock-widget">
                        <p id="currentDate" class="clock-date">2000/01/01 日</p>
                        <p id="currentTime" class="clock-time">10:20</p>
                    </div>

                    <div class="tag-section">
                        <h3>勉強内容</h3>
                        <select id="studyTag" name="studyTag" required>
                            <option value="">-- 選択してください --</option>
                            <option value="数学">数学</option>
                            <option value="英語">英語</option>
                            <option value="国語">国語</option>
                            <option value="社会">社会</option>
                            <option value="理科">理科</option>
                            <option value="プログラミング">プログラミング</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                </div>

                <div class="timer">
                    <h1 id="time">00:00:00</h1>
                    <p id="rank-progress" class="rank-progress">ランク状況を読み込み中...</p>
                    <button type="button" id="start">開始</button>
                    <button type="button" id="stop">停止</button>
                    <button type="button" id="reset">リセット</button>

                    <div class="action-buttons">
                        <button type="submit" id="send">登録</button>
                        <button type="button" onclick="debugSend()">デバッグ送信</button>
                        <a class="back-button" href="./homePage.html">戻る</a>
                    </div>
                </div>
            </form>
        </div>

        <script src="../../Controllers/Timer.js"></script>
        <script src="../js/timerSystem.js"></script>
    </body>
</html>
